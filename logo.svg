<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="body-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C2410C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="belly-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FED7AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FDBA74;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gear-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94A3B8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#64748B;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.18"/>
    </filter>
    <filter id="shadow-sm">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#1E293B"/>
  <circle cx="256" cy="256" r="224" fill="#0F172A"/>

  <!-- Gear behind the crab (host runtime) -->
  <g transform="translate(256, 268)" filter="url(#shadow-sm)">
    <g fill="url(#gear-grad)" opacity="0.3">
      <!-- Gear teeth -->
      <rect x="-14" y="-100" width="28" height="200" rx="6"/>
      <rect x="-100" y="-14" width="200" height="28" rx="6"/>
      <rect x="-14" y="-100" width="28" height="200" rx="6" transform="rotate(45)"/>
      <rect x="-14" y="-100" width="28" height="200" rx="6" transform="rotate(-45)"/>
      <!-- Gear body -->
      <circle cx="0" cy="0" r="60" fill="url(#gear-grad)" opacity="0.5"/>
      <circle cx="0" cy="0" r="30" fill="#0F172A"/>
    </g>
  </g>

  <!-- Crab body -->
  <g filter="url(#shadow)">
    <!-- Main body (round bun shape) -->
    <ellipse cx="256" cy="280" rx="120" ry="105" fill="url(#body-grad)"/>

    <!-- Belly patch -->
    <ellipse cx="256" cy="300" rx="80" ry="65" fill="url(#belly-grad)"/>

    <!-- Left claw arm -->
    <path d="M 136 260 Q 90 220 60 240 Q 30 260 50 290 Q 65 310 90 295 Q 110 280 136 275"
          fill="#EA580C" stroke="#C2410C" stroke-width="3" stroke-linejoin="round"/>
    <!-- Left claw pincer top -->
    <path d="M 50 255 Q 20 230 15 250 Q 12 265 40 270"
          fill="#F97316" stroke="#C2410C" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Left claw pincer bottom -->
    <path d="M 50 275 Q 25 290 20 275 Q 18 260 40 260"
          fill="#F97316" stroke="#C2410C" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Right claw arm -->
    <path d="M 376 260 Q 422 220 452 240 Q 482 260 462 290 Q 447 310 422 295 Q 402 280 376 275"
          fill="#EA580C" stroke="#C2410C" stroke-width="3" stroke-linejoin="round"/>
    <!-- Right claw pincer top -->
    <path d="M 462 255 Q 492 230 497 250 Q 500 265 472 270"
          fill="#F97316" stroke="#C2410C" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- Right claw pincer bottom -->
    <path d="M 462 275 Q 487 290 492 275 Q 494 260 472 260"
          fill="#F97316" stroke="#C2410C" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Legs (3 per side) -->
    <!-- Left legs -->
    <path d="M 155 320 Q 120 350 95 370" stroke="#EA580C" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M 148 345 Q 110 380 80 395" stroke="#EA580C" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M 155 365 Q 125 400 100 415" stroke="#EA580C" stroke-width="6" stroke-linecap="round" fill="none"/>
    <!-- Left feet -->
    <circle cx="95" cy="370" r="6" fill="#C2410C"/>
    <circle cx="80" cy="395" r="5.5" fill="#C2410C"/>
    <circle cx="100" cy="415" r="5" fill="#C2410C"/>

    <!-- Right legs -->
    <path d="M 357 320 Q 392 350 417 370" stroke="#EA580C" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M 364 345 Q 402 380 432 395" stroke="#EA580C" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M 357 365 Q 387 400 412 415" stroke="#EA580C" stroke-width="6" stroke-linecap="round" fill="none"/>
    <!-- Right feet -->
    <circle cx="417" cy="370" r="6" fill="#C2410C"/>
    <circle cx="432" cy="395" r="5.5" fill="#C2410C"/>
    <circle cx="412" cy="415" r="5" fill="#C2410C"/>
  </g>

  <!-- Face -->
  <g>
    <!-- Eyes (big, cute) -->
    <!-- Left eye white -->
    <ellipse cx="218" cy="255" rx="28" ry="30" fill="white"/>
    <!-- Left eye pupil -->
    <ellipse cx="222" cy="258" rx="14" ry="16" fill="#1E293B"/>
    <!-- Left eye shine -->
    <ellipse cx="228" cy="249" rx="6" ry="7" fill="white" opacity="0.9"/>

    <!-- Right eye white -->
    <ellipse cx="294" cy="255" rx="28" ry="30" fill="white"/>
    <!-- Right eye pupil -->
    <ellipse cx="290" cy="258" rx="14" ry="16" fill="#1E293B"/>
    <!-- Right eye shine -->
    <ellipse cx="296" cy="249" rx="6" ry="7" fill="white" opacity="0.9"/>

    <!-- Happy mouth -->
    <path d="M 232 295 Q 256 320 280 295"
          stroke="#92400E" stroke-width="3.5" stroke-linecap="round" fill="none"/>

    <!-- Cheek blush -->
    <ellipse cx="200" cy="295" rx="18" ry="12" fill="#FB923C" opacity="0.5"/>
    <ellipse cx="312" cy="295" rx="18" ry="12" fill="#FB923C" opacity="0.5"/>
  </g>

  <!-- Small shield icon on belly (security/sandboxing) -->
  <g transform="translate(256, 310)">
    <path d="M 0 -18 L 14 -10 L 14 4 Q 14 16 0 22 Q -14 16 -14 4 L -14 -10 Z"
          fill="#F97316" stroke="#92400E" stroke-width="2" opacity="0.6"/>
    <path d="M 0 -8 L 0 8 M -6 0 L 6 0" stroke="#92400E" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- "rusty" text at bottom -->
  <text x="256" y="465"
        font-family="sans-serif"
        font-size="42"
        font-weight="700"
        fill="#F97316"
        text-anchor="middle"
        letter-spacing="4">
    rusty
  </text>
</svg>
